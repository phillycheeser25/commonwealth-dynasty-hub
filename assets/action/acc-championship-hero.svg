<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Virginia Tech ACC Championship hero graphic</title>
  <desc id="desc">A maroon and orange editorial graphic showing Virginia Tech defeating Miami 58-55 in overtime for the ACC Championship.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#210010"/>
      <stop offset="0.45" stop-color="#63051f"/>
      <stop offset="1" stop-color="#f05a28"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".45"/>
      <stop offset=".45" stop-color="#ffb45c" stop-opacity=".18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity=".35"/>
    </filter>
    <pattern id="grain" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#fff" opacity=".08"/>
      <circle cx="6" cy="5" r="1" fill="#000" opacity=".12"/>
    </pattern>
  </defs>
  <rect width="1400" height="820" fill="url(#bg)"/>
  <rect width="1400" height="820" fill="url(#grain)"/>
  <circle cx="700" cy="240" r="440" fill="url(#glow)"/>
  <g opacity=".26" stroke="#fff" stroke-width="3" fill="none">
    <path d="M80 610 C260 545 430 585 590 505 S930 405 1320 455"/>
    <path d="M120 690 C360 640 520 690 720 620 S1050 520 1290 555"/>
    <path d="M210 190 h980"/>
    <path d="M250 230 h900"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="145" y="140" width="1110" height="540" rx="38" fill="#120914" opacity=".86"/>
    <rect x="185" y="180" width="1030" height="460" rx="26" fill="#260819" stroke="#ff8b3d" stroke-width="4"/>
  </g>
  <text x="700" y="245" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="70" fill="#fff" letter-spacing="3">ACC CHAMPIONS</text>
  <text x="700" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#ffd7b5" letter-spacing="5">CHARLOTTE • OVERTIME THRILLER</text>
  <g font-family="Arial Black, Impact, sans-serif" text-anchor="middle">
    <text x="430" y="455" font-size="120" fill="#f05a28">MIAMI</text>
    <text x="430" y="555" font-size="112" fill="#fff">55</text>
    <text x="970" y="455" font-size="120" fill="#f05a28">VT</text>
    <text x="970" y="555" font-size="112" fill="#fff">58</text>
    <text x="700" y="520" font-size="56" fill="#ffd7b5">OT</text>
  </g>
  <g font-family="Arial, sans-serif" font-weight="700" fill="#fff">
    <rect x="285" y="620" width="830" height="58" rx="29" fill="#f05a28"/>
    <text x="700" y="658" text-anchor="middle" font-size="25">WOODSIDE 9 REC • 196 YDS • 4 TD  |  VICK JR. 5 PASS TD</text>
  </g>
  <g opacity=".25" fill="#fff">
    <circle cx="175" cy="98" r="9"/>
    <circle cx="1218" cy="105" r="7"/>
    <circle cx="1140" cy="720" r="10"/>
    <circle cx="250" cy="730" r="6"/>
  </g>
</svg>
